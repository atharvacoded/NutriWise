<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriWise - Secure Login</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #f3fdf8 0%, #ffffff 50%, #eefbf4 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    
    .video-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Glassmorphic minimalist card */
    .login-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04), 0 1px 10px rgba(0,0,0,0.01);
      box-sizing: border-box;
      text-align: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }
    
    .logo-container span {
      color: #10b981; /* primary accent */
    }

    .logo-leaf {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 0 10px 0 10px;
      margin-right: 8px;
    }

    .login-subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
    }
    
    .form-group {
      text-align: left;
      margin-bottom: 1.25rem;
    }
    
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.4rem;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }
    
    .form-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-sizing: border-box;
      transition: all 0.2s ease;
      color: #333;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }
    
    .btn-submit {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      margin-top: 1rem;
      background: #10b981;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }
    
    .btn-submit:hover {
      background: #059669;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
    }

    .btn-submit:active {
      transform: translateY(1px);
    }

    #error-msg {
      color: #ef4444;
      font-size: 0.85rem;
      min-height: 1.2rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .auto-signup-note {
      font-size: 0.75rem;
      color: #888;
      margin-top: 1.5rem;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <video class="video-bg" autoplay loop muted playsinline>
    <source src="/ss/vecteezy_4k-high-res-footage-of-looped-multicolored-animated-gradient_6725614.mp4" type="video/mp4">
  </video>

  <div class="login-wrapper">
    <div class="logo-container">
      <div class="logo-leaf"></div>
      Nutri<span>Wise</span>
    </div>
    <div class="login-subtitle">Sign in or create an account</div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      
      <div id="error-msg"></div>

      <button type="submit" class="btn-submit" id="submitBtn">Continue</button>
    </form>
    
    <div class="auto-signup-note">
      If you don't have an account, we'll automatically create one for you when you log in.
    </div>
  </div>

  <script>
    // Require manual login for this session by clearing any previous session fragments
    sessionStorage.clear();

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("error-msg");
      const btn = document.getElementById("submitBtn");
      
      errorMsg.textContent = "";
      btn.textContent = "Authenticating...";
      btn.disabled = true;

      try {
        const response = await fetch("/api/auth", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          btn.textContent = "Success...";
          // Store token/email in session only
          sessionStorage.setItem("user_email", data.user.email);
          sessionStorage.setItem("user_id", data.user.id);
          // Redirect to app
          window.location.href = "/";
        } else {
          errorMsg.textContent = data.detail || "Authentication failed.";
          btn.textContent = "Continue";
          btn.disabled = false;
        }
      } catch (err) {
        errorMsg.textContent = "Network error. Please try again.";
        btn.textContent = "Continue";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
